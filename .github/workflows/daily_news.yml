name: Daily AI News Briefing

on:
  schedule:
    # Runs everyday at 9:00 AM Indian Standard Time (IST)
    - cron: '30 3 * * *'
  # Allows you to manually trigger the workflow from the GitHub Actions tab anytime
  workflow_dispatch:

jobs:
  run-summarizer:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout your code from the repository
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Setup Python environment on the runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    # 3. Install project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests langchain-google-genai pydantic python-dotenv

    # 4. Run the main automation script
    - name: Run News Summarizer & Email Dispatch
      env:
        # Pulls the secrets securely from your GitHub Repository settings
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: python main.py